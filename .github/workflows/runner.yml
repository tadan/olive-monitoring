name: Autonomous PRD Runner

on:
  push:
    branches: [main]

# Never cancel a running agent mid-task — queue instead.
concurrency:
  group: runner
  cancel-in-progress: false

jobs:
  run-next-prd:
    name: Run next eligible PRD
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT so the runner can push branches and open PRs that trigger CI.
          # Required secret: GH_PAT (classic token, repo scope)
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps for find_next_prd
        run: pip install pyyaml

      - name: Find next eligible PRD
        id: next-prd
        run: python docs/prds/find_next_prd.py
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Nothing to do — exit
        if: steps.next-prd.outputs.prd_id == ''
        run: echo "No eligible PRD found. Exiting." && exit 0

      # ── Agent steps (only when there is work to do) ──────────────────────

      - uses: actions/setup-node@v4
        if: steps.next-prd.outputs.prd_id != ''
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        if: steps.next-prd.outputs.prd_id != ''
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        if: steps.next-prd.outputs.prd_id != ''
        run: |
          git config user.email "olive-runner[bot]@users.noreply.github.com"
          git config user.name "Olive Runner"

      - name: Run autonomous agent
        if: steps.next-prd.outputs.prd_id != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PRD_ID: ${{ steps.next-prd.outputs.prd_id }}
          PRD_BRANCH: ${{ steps.next-prd.outputs.prd_branch }}
        run: |
          claude --dangerously-skip-permissions -p \
            "You are the olive-monitoring autonomous runner. \
            Read docs/prds/RUNNER.md for the full protocol. \
            The next eligible PRD is ${PRD_ID} on branch ${PRD_BRANCH}. \
            Run exactly one iteration of the loop described in RUNNER.md for this PRD."

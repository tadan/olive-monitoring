name: Autonomous PRD Runner

on:
  push:
    branches: [main]

# Queue runs; never cancel a running agent mid-task.
concurrency:
  group: runner
  cancel-in-progress: false

jobs:
  # ── Guard: budget check + PRD discovery ─────────────────────────────────
  guard:
    name: Check budget + find next PRD
    runs-on: ubuntu-latest
    outputs:
      prd_id: ${{ steps.next-prd.outputs.prd_id }}
      prd_branch: ${{ steps.next-prd.outputs.prd_branch }}
      prd_human_in_loop: ${{ steps.next-prd.outputs.prd_human_in_loop }}
      prd_linear_id: ${{ steps.next-prd.outputs.prd_linear_id }}
      prd_linear_url: ${{ steps.next-prd.outputs.prd_linear_url }}
      should_run: ${{ steps.gate.outputs.should_run }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install pyyaml

      # Hard daily cap: at most one successful runner run per calendar day (UTC).
      # Counts completed runs of this workflow today; exits gate if ≥1.
      - name: Daily budget check
        id: budget
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          RUNS=$(gh run list \
            --workflow=runner.yml \
            --status=success \
            --json=createdAt \
            --limit=10 \
            --jq="[.[] | select(.createdAt | startswith(\"$TODAY\"))] | length" \
            2>/dev/null || echo "0")
          echo "runs_today=$RUNS" >> "$GITHUB_OUTPUT"
          echo "Successful runner runs today: $RUNS"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}

      - name: Find next eligible PRD
        id: next-prd
        # Skip if daily budget already used.
        if: steps.budget.outputs.runs_today == '0'
        run: python docs/prds/find_next_prd.py
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || github.token }}

      # Gate is open only when both: budget free AND a PRD was found.
      - name: Set gate
        id: gate
        run: |
          if [ -n "${{ steps.next-prd.outputs.prd_id }}" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Agent: one autonomous task ───────────────────────────────────────────
  run-agent:
    name: Run ${{ needs.guard.outputs.prd_id }}
    needs: [guard]
    if: needs.guard.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # PAT required — GITHUB_TOKEN pushes don't trigger CI on the PR.
          # Add secret: GH_PAT (classic token, repo scope)
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git identity
        run: |
          git config user.email "olive-runner[bot]@users.noreply.github.com"
          git config user.name "Olive Runner"

      - name: Trust this workspace for Claude Code
        run: |
          cat > /home/runner/.claude.json <<'EOF'
          {
            "projects": {
              "/home/runner/work/olive-monitoring/olive-monitoring": {
                "hasTrustDialogAccepted": true
              }
            }
          }
          EOF

      - name: Notify Linear — runner started
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          PRD_LINEAR_ID: ${{ needs.guard.outputs.prd_linear_id }}
          PRD_BRANCH: ${{ needs.guard.outputs.prd_branch }}
          PRD_ID: ${{ needs.guard.outputs.prd_id }}
        run: |
          python docs/prds/linear_comment.py "$PRD_LINEAR_ID" \
            "🤖 Runner started on \`${PRD_BRANCH}\` — implementing one task from ${PRD_ID}."

      - name: Run autonomous agent
        timeout-minutes: 45
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          PRD_ID: ${{ needs.guard.outputs.prd_id }}
          PRD_BRANCH: ${{ needs.guard.outputs.prd_branch }}
          PRD_HUMAN_IN_LOOP: ${{ needs.guard.outputs.prd_human_in_loop }}
          PRD_LINEAR_ID: ${{ needs.guard.outputs.prd_linear_id }}
          PRD_LINEAR_URL: ${{ needs.guard.outputs.prd_linear_url }}
        run: |
          HUMAN_NOTE=""
          if [ "$PRD_HUMAN_IN_LOOP" = "true" ]; then
            HUMAN_NOTE="IMPORTANT: This PRD has human_in_loop: true. \
              Implement only tasks explicitly tagged AGENT in the YAML. \
              Stop immediately after — do NOT attempt tasks reserved for the human."
          fi

          LINEAR_NOTE=""
          if [ -n "$PRD_LINEAR_ID" ]; then
            LINEAR_NOTE="Linear issue: ${PRD_LINEAR_ID} (${PRD_LINEAR_URL}). \
              Include '${PRD_LINEAR_ID}' in the PR title so Linear auto-links it."
          fi

          claude --dangerously-skip-permissions \
            --model claude-opus-4-8 \
            --max-turns 80 \
            --verbose \
            -p "You are the olive-monitoring autonomous runner. \
              Read docs/prds/RUNNER.md for the full protocol. \
              The next eligible PRD is ${PRD_ID} on branch ${PRD_BRANCH}. \
              ${LINEAR_NOTE} \
              ${HUMAN_NOTE} \
              Run exactly one iteration of the loop described in RUNNER.md."

      - name: Notify Linear — PR opened
        if: always()
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
          PRD_LINEAR_ID: ${{ needs.guard.outputs.prd_linear_id }}
          PRD_BRANCH: ${{ needs.guard.outputs.prd_branch }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PR_URL=$(gh pr list --head "$PRD_BRANCH" --json url --jq '.[0].url' 2>/dev/null || echo "")
          if [ -n "$PR_URL" ]; then
            python docs/prds/linear_comment.py "$PRD_LINEAR_ID" \
              "🔗 PR opened: ${PR_URL}"
          else
            python docs/prds/linear_comment.py "$PRD_LINEAR_ID" \
              "🤖 Runner finished on \`${PRD_BRANCH}\` — no PR found (may have failed or already exists)."
          fi

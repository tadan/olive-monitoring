version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: olive-monitoring-db
    environment:
      POSTGRES_DB: olive_monitoring
      POSTGRES_USER: olive_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    # Port not exposed externally - only accessible within Docker network
    # This prevents conflicts with existing PostgreSQL installations
    restart: unless-stopped
    networks:
      - olive-net

  processor:
    build:
      context: .
      dockerfile: docker/processor.Dockerfile
    container_name: olive-monitoring-processor
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: olive_monitoring
      DB_USER: olive_user
      DB_PASSWORD: ${DB_PASSWORD}
      COPERNICUS_USERNAME: ${COPERNICUS_USERNAME}
      COPERNICUS_PASSWORD: ${COPERNICUS_PASSWORD}
    volumes:
      - ./backend:/app
      - satellite-data:/app/data
    depends_on:
      - postgres
    networks:
      - olive-net
    command: tail -f /dev/null  # Keep container running for manual execution initially

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: olive-monitoring-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: olive_monitoring
      DB_USER: olive_user
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./backend:/app
    # Port no longer exposed externally - nginx handles all traffic
    depends_on:
      - postgres
    networks:
      - olive-net
    restart: unless-stopped

  dashboard:
    image: nginx:alpine
    container_name: olive-monitoring-dashboard
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"  # Expose dashboard on port 8080
    depends_on:
      - api
    networks:
      - olive-net
    restart: unless-stopped

volumes:
  postgres-data:
  satellite-data:

networks:
  olive-net:
    driver: bridge
